<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#050510">
  <title>Aura Morph AI</title>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="particle-canvas" aria-label="Interactive particle visualization"></canvas>
  <div class="ambient ambient-one"></div>
  <div class="ambient ambient-two"></div>

  <header class="topbar">
    <a class="brand" href="#" aria-label="Aura Morph home">
      <span class="brand-mark"></span>
      <span>AURA <b>MORPH</b></span>
    </a>
    <div id="status-pill" class="status-pill">
      <span class="status-dot"></span>
      <span id="status-text">Ready</span>
    </div>
  </header>

  <main>
    <section class="hero" aria-labelledby="hero-title">
      <p class="eyebrow">VOICE · TEXT · IMAGE</p>
      <h1 id="hero-title">Shape your words<br><span>into light.</span></h1>
      <p class="subtitle">Type, speak, or upload an image and watch it become a living particle sculpture.</p>
    </section>

    <aside id="camera-panel" class="camera-panel" hidden>
      <video id="webcam" autoplay playsinline muted></video>
      <canvas id="hand-canvas"></canvas>
      <div class="camera-label">GESTURE CONTROL</div>
    </aside>

    <section class="composer" aria-label="Particle controls">
      <div class="input-shell">
        <button id="mic-btn" class="icon-btn" type="button" aria-label="Start voice input" title="Voice input">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 15a3 3 0 0 0 3-3V6a3 3 0 1 0-6 0v6a3 3 0 0 0 3 3Zm-7-3a1 1 0 1 1 2 0 5 5 0 0 0 10 0 1 1 0 1 1 2 0 7 7 0 0 1-6 6.92V21h3a1 1 0 1 1 0 2H8a1 1 0 1 1 0-2h3v-2.08A7 7 0 0 1 5 12Z"/></svg>
        </button>
        <input id="text-input" type="text" maxlength="60" autocomplete="off" placeholder="Type something beautiful…">
        <button id="send-btn" class="send-btn" type="button" aria-label="Create particle text">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m4.7 4.7 15.6 6.4a1 1 0 0 1 0 1.8L4.7 19.3a1 1 0 0 1-1.35-1.14L4.6 13H11a1 1 0 1 0 0-2H4.6L3.35 5.84A1 1 0 0 1 4.7 4.7Z"/></svg>
        </button>
      </div>

      <div class="quick-actions">
        <button id="upload-btn" class="action-btn" type="button">
          <span>＋</span> Upload image
        </button>
        <button id="gesture-btn" class="action-btn" type="button">
          <span>✦</span> Gestures
        </button>
        <button id="reset-btn" class="action-btn" type="button">
          <span>↻</span> Reset
        </button>
        <select id="language-select" class="language-select" aria-label="Voice language">
          <option value="en-US">EN</option>
          <option value="bn-BD">বাংলা</option>
        </select>
      </div>
      <input id="file-input" type="file" accept="image/*" hidden>
      <p class="hint">Press Enter to morph · Drag to rotate · Scroll to zoom</p>
    </section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="script.js"></script>
</body>
</html>
